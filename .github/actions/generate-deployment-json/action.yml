name: 'Generate Deployment JSON'
description: 'Generate deployment.json from example template for CI deployments'
inputs:
  account_id:
    description: 'AWS account ID'
    required: true
  region:
    description: 'AWS region'
    required: true
  hosted_zone_id:
    description: 'Route 53 hosted zone ID'
    required: false
    default: ''
  hosted_zone_name:
    description: 'Route 53 hosted zone name'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Generate deployment.json
      working-directory: cdk
      shell: bash
      env:
        ACCOUNT_ID: ${{ inputs.account_id }}
        REGION: ${{ inputs.region }}
        HOSTED_ZONE_ID: ${{ inputs.hosted_zone_id }}
        HOSTED_ZONE_NAME: ${{ inputs.hosted_zone_name }}
      run: |
        python3 << 'EOF'
        import json
        import os

        with open('bin/deployment/deployment.json.example') as f:
            config = json.load(f)

        # Inject account settings
        config['account']['id'] = os.environ['ACCOUNT_ID']
        config['account']['region'] = os.environ['REGION']
        config['account']['prodLike'] = False

        # Inject Route 53 hosted zone if provided
        hosted_zone_id = os.environ.get('HOSTED_ZONE_ID', '')
        hosted_zone_name = os.environ.get('HOSTED_ZONE_NAME', '')
        if hosted_zone_id:
            config['dataplaneConfig']['DOMAIN_HOSTED_ZONE_ID'] = hosted_zone_id
        if hosted_zone_name:
            config['dataplaneConfig']['DOMAIN_HOSTED_ZONE_NAME'] = hosted_zone_name

        # Remove fields that should be auto-resolved from hosted zone
        config['dataplaneConfig'].pop('DOMAIN_HOSTNAME', None)
        config['dataplaneConfig'].pop('DOMAIN_CERTIFICATE_ARN', None)

        with open('bin/deployment/deployment.json', 'w') as f:
            json.dump(config, f, indent=2)

        print("Generated deployment.json:")
        print(json.dumps(config, indent=2))
        EOF
