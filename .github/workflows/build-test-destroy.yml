name: Validate

on:
  schedule:
    - cron: '0 3 * * *'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: "us-west-2"
  AWS_PAGER: ""

permissions:
  id-token: write
  contents: read
  actions: read
  security-events: write

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    uses: ./.github/workflows/check-pending-workflow.yml
    secrets: inherit

  cdk-checks:
    uses: ./.github/workflows/cdk.yml
    secrets: inherit

  check-doc-only:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      deploy_relevant: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            deploy:
              - '!docs/**'
              - '!README.md'
              - '!CODE_OF_CONDUCT.md'
              - '!CONTRIBUTING.md'
              - '!SECURITY.md'
              - '!LICENSE'
              - '!.gitallowed'

  get-aws-region:
    runs-on: ubuntu-latest
    outputs:
      aws_region: ${{ env.AWS_REGION }}
    steps:
      - name: Set AWS Region
        run: |
          echo "Using AWS Region: ${{ env.AWS_REGION }}"

  # Manual approval gate for Dependabot PRs. Dependabot runs only receive secrets
  # from the Dependabot secrets store, so deploy/integration-test/destroy can run
  # on dependency-bump PRs — but that executes the just-bumped third-party code with
  # account-level deploy credentials. This job pauses such runs (via the
  # dependabot-review environment's required reviewers) until a maintainer reviews
  # the diff and approves. It is skipped for human PRs and the nightly schedule, so
  # their behavior is unchanged. Note: only this no-op job references the environment,
  # which keeps deploy.yml's OIDC subject claim (and thus the IAM trust policy) intact.
  dependabot-gate:
    needs:
      - check
      - cdk-checks
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment: dependabot-review
    steps:
      - name: Maintainer approved Dependabot deploy
        run: echo "Maintainer approved. Proceeding with deploy / integration-test / destroy."

  deploy:
    needs:
      - check
      - cdk-checks
      - check-doc-only
      - get-aws-region
      - dependabot-gate
    if: |
      always() &&
      needs.check.result == 'success' &&
      needs.cdk-checks.result == 'success' &&
      (needs.dependabot-gate.result == 'success' || needs.dependabot-gate.result == 'skipped') &&
      (needs.check-doc-only.result == 'skipped' || needs.check-doc-only.outputs.deploy_relevant == 'true')
    uses: ./.github/workflows/deploy.yml
    with:
      aws_region: ${{ needs.get-aws-region.outputs.aws_region }}
    secrets: inherit

  integration-test:
    needs:
      - deploy
      - get-aws-region
    # `always() &&` is required, not cosmetic: deploy is gated with `if: always()`,
    # and an `if` without a status-check function is implicitly ANDed with `success()`
    # of all needs — which evaluates false when a dependency used always(), silently
    # skipping this job even when deploy succeeded. Mirrors the destroy job below.
    # Runs only on a real deploy success; auto-skips when deploy is skipped (doc-only
    # PRs) or failed.
    if: always() && needs.deploy.result == 'success'
    uses: ./.github/workflows/integ-test.yml
    with:
      aws_region: ${{ needs.get-aws-region.outputs.aws_region }}
    secrets: inherit

  destroy:
    if: always() && needs.deploy.result != 'skipped'
    needs:
      - check
      - deploy
      - integration-test
      - get-aws-region
    uses: ./.github/workflows/destroy.yml
    with:
      aws_region: ${{ needs.get-aws-region.outputs.aws_region }}
    secrets: inherit

  notify-nightly-failure:
    if: failure() && github.event_name == 'schedule'
    needs:
      - check
      - deploy
      - integration-test
      - destroy
      - get-aws-region
    uses: ./.github/workflows/slack-notify-nightly-failure.yml
    with:
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets: inherit
