name: Validate

on:
  schedule:
    - cron: '0 3 * * *'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: "us-west-2"
  AWS_PAGER: ""

permissions:
  id-token: write
  contents: read
  actions: read
  security-events: write

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    uses: ./.github/workflows/check-pending-workflow.yml
    secrets: inherit

  cdk-checks:
    uses: ./.github/workflows/cdk.yml
    secrets: inherit

  check-doc-only:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      deploy_relevant: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            deploy:
              - '!docs/**'
              - '!README.md'
              - '!CODE_OF_CONDUCT.md'
              - '!CONTRIBUTING.md'
              - '!SECURITY.md'
              - '!LICENSE'
              - '!.gitallowed'

  get-aws-region:
    runs-on: ubuntu-latest
    outputs:
      aws_region: ${{ env.AWS_REGION }}
    steps:
      - name: Set AWS Region
        run: |
          echo "Using AWS Region: ${{ env.AWS_REGION }}"

  deploy:
    needs:
      - check
      - cdk-checks
      - check-doc-only
      - get-aws-region
    if: |
      always() &&
      needs.check.result == 'success' &&
      needs.cdk-checks.result == 'success' &&
      (needs.check-doc-only.result == 'skipped' || needs.check-doc-only.outputs.deploy_relevant == 'true')
    uses: ./.github/workflows/deploy.yml
    with:
      aws_region: ${{ needs.get-aws-region.outputs.aws_region }}
    secrets: inherit

  integration-test:
    needs:
      - deploy
      - get-aws-region
    if: needs.deploy.result == 'success'
    uses: ./.github/workflows/integ-test.yml
    with:
      aws_region: ${{ needs.get-aws-region.outputs.aws_region }}
    secrets: inherit

  destroy:
    if: always() && needs.deploy.result != 'skipped'
    needs:
      - check
      - deploy
      - integration-test
      - get-aws-region
    uses: ./.github/workflows/destroy.yml
    with:
      aws_region: ${{ needs.get-aws-region.outputs.aws_region }}
    secrets: inherit

  notify-nightly-failure:
    if: failure() && github.event_name == 'schedule'
    needs:
      - check
      - deploy
      - integration-test
      - destroy
      - get-aws-region
    uses: ./.github/workflows/slack-notify-nightly-failure.yml
    with:
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets: inherit
