name: Run Integration Tests

permissions:
  id-token: write
  contents: read

on:
  workflow_call:
    inputs:
      aws_region:
        required: true
        type: string
    secrets:
      AUTH_SERVER_ACCOUNT_ID:
        required: true
      DOMAIN_HOSTED_ZONE_ID:
        required: true
      DOMAIN_HOSTED_ZONE_NAME:
        required: true

env:
  AWS_REGION: ${{ inputs.aws_region }}
  AWS_PAGER: ""
  NODE_VERSION: '24'

jobs:
  run-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup AWS OIDC
        uses: ./.github/actions/setup-aws-oidc
        with:
          aws_region: ${{ inputs.aws_region }}
          account_id: ${{ secrets.AUTH_SERVER_ACCOUNT_ID }}
          role_duration_seconds: '7200'
      - name: Setup CDK
        uses: ./.github/actions/setup-cdk
        with:
          node_version: ${{ env.NODE_VERSION }}
      - name: Generate deployment.json
        uses: ./.github/actions/generate-deployment-json
        with:
          account_id: ${{ secrets.AUTH_SERVER_ACCOUNT_ID }}
          region: ${{ inputs.aws_region }}
          hosted_zone_id: ${{ secrets.DOMAIN_HOSTED_ZONE_ID }}
          hosted_zone_name: ${{ secrets.DOMAIN_HOSTED_ZONE_NAME }}
      - name: Build CDK
        working-directory: cdk
        run: npm run build
      - name: Run integration tests
        working-directory: cdk
        run: npx jest --selectProjects integration --no-coverage --verbose
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: cdk/test-results/
          if-no-files-found: ignore
