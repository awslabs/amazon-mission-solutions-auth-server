# This workflow performs code quality checks and security scanning

name: CDK

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup CDK
        uses: ./.github/actions/setup-cdk
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install git-secrets
        run: |
          git clone https://github.com/awslabs/git-secrets.git /tmp/git-secrets
          cd /tmp/git-secrets && sudo make install
      - name: Register AWS patterns
        run: git secrets --register-aws
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Install pre-commit hooks
        run: pre-commit install-hooks
      - name: Run pre-commit hooks
        run: pre-commit run --from-ref origin/main --to-ref HEAD

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup CDK
        uses: ./.github/actions/setup-cdk
      - name: Build
        working-directory: cdk
        run: npm run build
      - name: Test
        working-directory: cdk
        run: npm test

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
      - name: License check - cdk
        working-directory: cdk
        run: |
          npm ci
          npx --yes license-checker --production \
            --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;BlueOak-1.0.0;(MIT OR GPL-3.0-or-later)" \
            --excludePrivatePackages
      - name: License check - lambda
        working-directory: cdk/lambda/keycloak-config
        run: |
          npm ci
          npx --yes license-checker --production \
            --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;BlueOak-1.0.0"

  security-scan:
    runs-on: ubuntu-latest
    needs: quality-checks
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
      - name: Install npm dependencies
        run: |
          cd cdk && npm ci
          cd lambda/keycloak-config && npm ci
      - name: Install ASH
        run: pip install "git+https://github.com/awslabs/automated-security-helper.git@v3.2.1"
      - name: Run ASH Security Scan
        run: ash --mode local --config .ash/ash.yaml --no-fail-on-findings
      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .ash/ash_output/reports/ash.sarif
          category: ash
      - name: Upload ASH Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ash-security-results
          path: .ash/ash_output/
          retention-days: 30
          if-no-files-found: warn
