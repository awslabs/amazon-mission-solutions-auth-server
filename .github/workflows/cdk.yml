# This workflow performs code quality checks and security scanning

name: CDK

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    paths:
      - 'cdk/**'
      - '.github/workflows/cdk.yml'
      - '.pre-commit-config.yaml'

permissions:
  contents: read

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup CDK
        uses: ./.github/actions/setup-cdk
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Install pre-commit hooks
        run: pre-commit install-hooks
      - name: Run pre-commit hooks
        run: pre-commit run --from-ref origin/main --to-ref HEAD

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup CDK
        uses: ./.github/actions/setup-cdk
      - name: Build
        working-directory: cdk
        run: npm run build
      - name: Test
        working-directory: cdk
        run: npm test

  security-scan:
    runs-on: ubuntu-latest
    needs: quality-checks
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run ASH Security Scan
        run: |
          # Run ASH security scanning
          pre-commit run --hook-stage manual ash
      - name: Upload ASH Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ash-security-results
          path: aggregated_results.txt
          retention-days: 30
