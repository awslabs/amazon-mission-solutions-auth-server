name: Destroy Infrastructure

permissions:
  id-token: write
  contents: read

on:
  workflow_call:
    inputs:
      aws_region:
        required: true
        type: string
    secrets:
      AUTH_SERVER_ACCOUNT_ID:
        required: true
      DOMAIN_HOSTED_ZONE_ID:
        required: true
      DOMAIN_HOSTED_ZONE_NAME:
        required: true

env:
  AWS_REGION: ${{ inputs.aws_region }}
  AWS_PAGER: ""
  NODE_VERSION: '24'

jobs:
  destroy-infrastructure:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup AWS OIDC
        uses: ./.github/actions/setup-aws-oidc
        with:
          aws_region: ${{ inputs.aws_region }}
          account_id: ${{ secrets.AUTH_SERVER_ACCOUNT_ID }}
          role_duration_seconds: '14400'
      - name: Setup CDK
        uses: ./.github/actions/setup-cdk
        with:
          node_version: ${{ env.NODE_VERSION }}
      - name: Generate deployment.json
        uses: ./.github/actions/generate-deployment-json
        with:
          account_id: ${{ secrets.AUTH_SERVER_ACCOUNT_ID }}
          region: ${{ inputs.aws_region }}
          hosted_zone_id: ${{ secrets.DOMAIN_HOSTED_ZONE_ID }}
          hosted_zone_name: ${{ secrets.DOMAIN_HOSTED_ZONE_NAME }}
      - name: Build CDK
        working-directory: cdk
        run: npm run build
      - name: Destroy CDK infrastructure
        working-directory: cdk
        run: |
          set +e
          cdk destroy --all --force
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::CDK destroy failed with exit code $EXIT_CODE"
            exit 1
          fi
