repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/aws-samples/automated-security-helper
    rev: 'v3.0.0'
    hooks:
      - id: ash
        stages: [manual]
        # uncomment the line below if using "finch" on MacOS
        # args: [ "-f" ]

  - repo: local
    hooks:
      - id: check-copyright
        name: Check for copyright
        entry: python .github/hooks/check-copyright.py
        language: system
        exclude: |
          (?x)^(
            ^\..+|
            .+\.md$|
            .+\.json$|
            .+\.ya?ml$|
            .+\.config\.js$|
            .+\.config\.mjs$|
            eslint\.config\.mjs$|
            jest\.config\.js$|
            .+\.lock$|
            .*/node_modules/.*|
            .*/cdk\.out/.*|
            .*/coverage/.*|
            .*/dist/.*|
            cdk/config/.*|
            cdk/\.prettierrc$|
            cdk/\.prettierignore$|
            cdk/.+\.example$|
            docs/.*|
            LICENSE|
            NOTICE|
            README\.md|
            CONTRIBUTING\.md|
            CODE_OF_CONDUCT\.md|
          )$

      - id: npm-install
        name: Install npm dependencies
        entry: bash -c 'cd cdk && npm ci'
        language: system
        files: ^cdk/.*\.(ts|tsx|js|jsx|json)$
        pass_filenames: false

      - id: jest
        name: Jest Tests
        entry: bash -c 'cd cdk && npm test'
        language: system
        files: ^cdk/.*\.(ts|tsx)$
        types: [file]
        pass_filenames: false
        stages: [manual]

      - id: eslint
        name: ESLint
        entry: bash -c 'cd cdk && npx eslint --fix --max-warnings 0 "**/*.{js,ts}"'
        language: system
        files: ^cdk/.*\.(ts|tsx|js)$
        types: [file]

      - id: prettier
        name: Prettier
        entry: bash -c 'cd cdk && npx prettier --write .'
        language: system
        files: ^cdk/.*\.(ts|tsx|js|jsx|json|yml|yaml|md)$
        types: [file]
