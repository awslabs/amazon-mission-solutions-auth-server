repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.4.0
  hooks:
    - id: check-yaml
    - id: end-of-file-fixer
    - id: trailing-whitespace

- repo: https://github.com/awslabs/automated-security-helper.git
  rev: 'v2.0.1'
  hooks:
    - id: ash
      name: scan files using ash
      stages: [ manual ]

- repo: local
  hooks:
      - id: check-copyright
        name: Check for copyright
        entry: python .github/hooks/check-copyright.py
        language: system
        exclude: |
          (?x)^(
            ^\..+|
            .+\.md$|
            .+\.json$|
            .+\.ya?ml$|
            .+\.config\.js$|
            .+\.config\.mjs$|
            eslint\.config\.mjs$|
            jest\.config\.js$|
            .+\.lock$|
            .*/node_modules/.*|
            .*/cdk\.out/.*|
            .*/coverage/.*|
            cdk/config/.*|
            cdk/\.prettierrc$|
            docs/.*|
            LICENSE|
            NOTICE|
            README\.md|
            CONTRIBUTING\.md|
            CODE_OF_CONDUCT\.md|
          )$

- repo: local
  hooks:
    - id: npm-install
      name: Install npm dependencies
      entry: bash -c 'cd cdk && npm ci'
      language: system
      files: ^cdk/.*\.(ts|tsx|js|jsx|json)$
      pass_filenames: false

    - id: jest
      name: Jest Tests
      entry: bash -c 'cd cdk && npm run test'
      language: system
      files: ^cdk/.*\.(ts|tsx)$
      types: [ file ]
      pass_filenames: false
      stages: [manual]

    - id: eslint
      name: ESLint
      entry: bash -c 'cd cdk && npm run lint:check'
      language: system
      files: ^cdk/.*\.(ts|tsx)$
      types: [file]

    - id: prettier
      name: Prettier
      entry: bash -c 'cd cdk && npm run format'
      language: system
      files: ^cdk/.*\.(ts|tsx|js|jsx|json|yml|yaml|md)$
      types: [file]
